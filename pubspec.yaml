name: qr_generator
description: "Generate QrBarcode Freely."
publish_to: 'none'
version: 0.3.0+3

environment:
  sdk: ^3.10.3

dependencies:
  barcode_widget: ^2.0.4
  cloud_firestore: ^6.1.2
  dartz: ^0.10.1
  device_info_plus: ^12.3.0
  equatable: ^2.0.8
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  firebase_storage: ^13.0.6
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_svg: ^2.2.3
  get_it: ^9.2.1
  go_router: ^17.1.0
  http: ^1.6.0
  image_gallery_saver_plus: ^4.0.1
  image_picker: ^1.2.1
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  qr_flutter: ^4.1.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/app_logo.png
    - assets/leos-logo.png
    - assets/App-Logo-No-Background.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/App-Logo-No-Background.png"
  image_path_ios: "assets/app_logo.png"
  min_sdk_android: 21
